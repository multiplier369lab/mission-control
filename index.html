<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>乗数ラボ MISSION CONTROL — GLYPH / SANCTUM / PRIME</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060913;
  --bg2:#09111f;
  --surface:rgba(13,19,34,.82);
  --surface-2:rgba(10,16,29,.94);
  --card:rgba(17,24,41,.75);
  --line:rgba(255,255,255,.10);
  --line2:rgba(255,255,255,.06);
  --text:#f7f9fc;
  --text2:#c6cfdf;
  --text3:#8a97b0;
  --acc:#dfff4f;
  --acc2:#9cff57;
  --violet:#8c8cff;
  --pink:#ff5ea8;
  --green:#3ddc91;
  --orange:#ff9b54;
  --cyan:#56d8ff;
  --amber:#ffcb66;
  --danger:#f43f5e;
  --shadow:0 18px 60px rgba(0,0,0,.45);
  --radius:22px;
  --glass-blur:blur(18px);
  --layout-image:none;
  --prime-gold:#d3b26d;
  --prime-gold-2:#7a5a20;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:radial-gradient(circle at 10% 10%,rgba(140,140,255,.10),transparent 30%),radial-gradient(circle at 90% 10%,rgba(223,255,79,.08),transparent 24%),linear-gradient(180deg,#05070d 0%,#090d16 100%);color:var(--text);font-family:'Inter','Noto Sans JP',sans-serif;overflow:hidden}
body[data-theme="glyph"]{
  --acc:#dfff4f;
  --acc2:#9cff57;
  --surface:rgba(13,19,34,.82);
  --surface-2:rgba(10,16,29,.94);
  --card:rgba(17,24,41,.75);
}
body[data-theme="sanctum"]{
  --acc:#68f5db;
  --acc2:#5ec5ff;
  --surface:rgba(6,18,24,.80);
  --surface-2:rgba(5,15,22,.95);
  --card:rgba(8,22,28,.78);
}
body[data-theme="prime"]{
  --acc:#d6ff67;
  --acc2:#9dff56;
  --surface:rgba(10,14,18,.78);
  --surface-2:rgba(8,12,16,.96);
  --card:rgba(14,18,22,.82);
}
a{color:inherit}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:999px}

#app{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.bg-orb{
  position:absolute;
  inset:auto auto 10% -10%;
  width:42vw;height:42vw;border-radius:50%;
  background:radial-gradient(circle,rgba(140,140,255,.14),transparent 66%);
  filter:blur(24px);
  pointer-events:none;
  z-index:0;
}
.bg-orb.b2{
  inset:2% -8% auto auto;
  background:radial-gradient(circle,rgba(223,255,79,.10),transparent 66%);
}

.topbar{
  position:relative;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:14px 20px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(8,12,22,.92),rgba(8,12,22,.72));
  backdrop-filter:var(--glass-blur);
  flex-shrink:0;
}
.brand{
  display:flex;align-items:center;gap:14px;min-width:0
}
.brand-mark{
  width:12px;height:12px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  box-shadow:0 0 18px color-mix(in srgb, var(--acc) 70%, transparent);
  flex-shrink:0;
  animation:brandPulse 2s ease-in-out infinite;
}
@keyframes brandPulse{
  0%,100%{transform:scale(1);opacity:.85}
  50%{transform:scale(1.18);opacity:1}
}
.brand-copy{min-width:0}
.brand-kicker{font-size:10px;letter-spacing:.18em;font-weight:800;color:var(--text3);text-transform:uppercase}
.brand-title{font-size:16px;font-weight:900;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-sub{font-size:11px;color:var(--text3);margin-top:2px}
.topbar-center{
  display:flex;align-items:center;gap:14px;min-width:0;flex:1;justify-content:center
}
.revenue-pill{
  display:flex;align-items:baseline;gap:8px;
  padding:10px 14px;border-radius:999px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}
.revenue-pill .label{font-size:11px;color:var(--text3);font-weight:700}
.revenue-pill .value{font-size:24px;font-weight:900;color:var(--acc);letter-spacing:-.03em}
.revenue-pill .suffix{font-size:11px;color:var(--text3)}
.progress-chip{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:999px;
  background:rgba(223,255,79,.08);
  border:1px solid rgba(223,255,79,.18);
  color:var(--acc);
  font-size:11px;font-weight:800
}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.day-badge,.theme-badge{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text2);
  padding:10px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}
.icon-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:14px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text2);
  transition:.18s ease;
}
.icon-btn:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--acc) 60%, var(--line));color:var(--acc)}

.goalbar{
  position:relative;
  z-index:18;
  display:flex;align-items:center;gap:14px;
  padding:10px 20px;
  border-bottom:1px solid var(--line2);
  background:linear-gradient(90deg,rgba(223,255,79,.05),rgba(140,140,255,.03));
  flex-shrink:0;
}
.goal-current{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.goal-icon{
  width:28px;height:28px;border-radius:10px;
  display:grid;place-items:center;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  flex-shrink:0;
}
.goal-text{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:13px;font-weight:700
}
.goal-actions{display:flex;gap:8px}
.pill-btn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text2);
  border-radius:999px;
  padding:7px 12px;
  font-size:11px;font-weight:800;
  transition:.15s ease;
}
.pill-btn:hover{border-color:var(--acc);color:var(--acc)}
#goal-switcher{
  position:absolute;left:20px;right:20px;top:calc(100% + 8px);
  display:none;flex-direction:column;gap:6px;
  padding:8px;
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
  max-height:280px;overflow:auto;
}
#goal-switcher.on{display:flex}
.goal-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:14px;
  background:transparent;border:1px solid transparent;
}
.goal-item:hover{background:rgba(255,255,255,.04)}
.goal-item.active{
  background:rgba(223,255,79,.07);
  border-color:rgba(223,255,79,.16);
}
.goal-dot{width:8px;height:8px;border-radius:999px;flex-shrink:0}
.goal-meta{font-size:10px;color:var(--text3);margin-left:auto}
.goal-del{
  background:none;border:none;color:var(--text3);padding:4px 8px
}
.goal-del:hover{color:var(--danger)}

.theme-switch{
  position:relative;
  z-index:18;
  display:flex;align-items:center;gap:8px;
  padding:12px 20px;
  border-bottom:1px solid var(--line2);
  background:rgba(7,10,17,.66);
  backdrop-filter:blur(12px);
  flex-shrink:0;
}
.theme-switch-label{font-size:11px;color:var(--text3);font-weight:800;letter-spacing:.16em;text-transform:uppercase}
.theme-seg{
  display:flex;gap:8px;flex-wrap:wrap
}
.theme-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--text2);
  transition:.18s ease;
}
.theme-btn .theme-mini{
  width:10px;height:10px;border-radius:999px;background:var(--acc);
  box-shadow:0 0 16px color-mix(in srgb,var(--acc) 70%, transparent)
}
.theme-btn small{
  display:block;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.14em
}
.theme-btn b{font-size:12px}
.theme-btn.active{
  background:rgba(255,255,255,.08);
  border-color:color-mix(in srgb,var(--acc) 65%, var(--line));
  color:var(--text);
  transform:translateY(-1px);
}

#stage{
  position:relative;
  flex:1;
  overflow:hidden;
  z-index:1;
}
.theme-layout{
  position:absolute;inset:0;
  overflow:auto;
  padding:22px;
  display:none;
}
.theme-layout.active{display:block}
.panel{
  background:var(--surface);
  border:1px solid var(--line);
  backdrop-filter:var(--glass-blur);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.panel-soft{
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));
  border:1px solid var(--line);
  border-radius:20px;
}
.section-title{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  margin-bottom:14px
}
.section-title .eyebrow{
  font-size:10px;
  color:var(--text3);
  letter-spacing:.18em;
  text-transform:uppercase;
  font-weight:800;
}
.section-title .title{
  font-size:18px;
  font-weight:900;
  letter-spacing:-.03em;
}
.mono{font-family:'JetBrains Mono',monospace}
.muted{color:var(--text3)}
.accent{color:var(--acc)}
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
}
.kpi-card{
  padding:16px 16px 14px;
  border-radius:20px;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid var(--line);
}
.kpi-card .label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-weight:800}
.kpi-card .value{font-size:28px;font-weight:900;letter-spacing:-.04em;margin-top:8px;color:var(--text)}
.kpi-card .sub{font-size:11px;color:var(--text2);margin-top:5px}

.agent-chip-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.agent-chip{
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line2);
  transition:.18s ease;
}
.agent-chip:hover{transform:translateY(-1px);border-color:var(--line)}
.agent-chip.active{
  border-color:color-mix(in srgb,var(--agent-color) 55%, var(--line));
  background:color-mix(in srgb,var(--agent-color) 10%, rgba(255,255,255,.03));
}
.agent-chip .top{
  display:flex;align-items:center;gap:10px
}
.agent-ic{
  width:36px;height:36px;border-radius:12px;
  display:grid;place-items:center;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  font-size:16px;flex-shrink:0
}
.agent-meta{min-width:0}
.agent-name{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-role{font-size:10px;color:var(--text3);margin-top:2px}
.agent-bar{
  height:5px;border-radius:999px;background:rgba(255,255,255,.06);
  overflow:hidden;margin-top:10px
}
.agent-bar > span{
  display:block;height:100%;border-radius:999px;background:var(--agent-color)
}

.quick-actions{display:flex;gap:10px;flex-wrap:wrap}
.quick-btn{
  border-radius:999px;padding:10px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  color:var(--text2);
  font-size:11px;font-weight:800;
}
.quick-btn:hover{border-color:var(--acc);color:var(--acc)}

.theme-hero{
  position:relative;
  min-height:260px;
  overflow:hidden;
}
.theme-hero::before{
  content:"";
  position:absolute;inset:0;
  background:
    linear-gradient(90deg,rgba(7,10,18,.92) 0%,rgba(7,10,18,.55) 42%,rgba(7,10,18,.18) 68%,rgba(7,10,18,.74) 100%),
    var(--layout-image) center/cover no-repeat;
}
.theme-hero::after{
  content:"";
  position:absolute;inset:auto -5% -30% auto;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,rgba(223,255,79,.20),transparent 68%);
  filter:blur(20px)
}
.theme-hero-inner{
  position:relative;z-index:1;
  display:flex;flex-direction:column;justify-content:space-between;
  min-height:260px;padding:24px;
}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap}
.hero-badge{
  padding:7px 10px;border-radius:999px;
  font-size:10px;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05)
}
.hero-title{
  font-size:38px;font-weight:900;letter-spacing:-.05em;line-height:1.05;
  max-width:740px
}
.hero-copy{
  margin-top:12px;max-width:680px;
  font-size:13px;line-height:1.85;color:var(--text2)
}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.cta{
  border:none;border-radius:16px;padding:13px 16px;
  font-size:12px;font-weight:900;
  background:linear-gradient(135deg,var(--acc),color-mix(in srgb,var(--acc) 65%, white));
  color:#0b1018;
  box-shadow:0 10px 30px color-mix(in srgb,var(--acc) 30%, transparent)
}
.cta.alt{
  background:rgba(255,255,255,.05);color:var(--text);
  border:1px solid var(--line);
  box-shadow:none
}

.layout-grid{
  display:grid;
  gap:16px;
}

/* GLYPH */
#glyph-layout .layout-grid{
  grid-template-columns:320px 1.2fr .9fr;
  grid-template-areas:
    "left center right"
    "left bottom right";
}
#glyph-left{grid-area:left;padding:18px}
#glyph-center{grid-area:center;display:flex;flex-direction:column;gap:16px}
#glyph-right{grid-area:right;display:flex;flex-direction:column;gap:16px}
#glyph-bottom{grid-area:bottom;padding:18px}
.side-scroll{max-height:calc(100vh - 270px);overflow:auto}
.small-list{display:flex;flex-direction:column;gap:10px}
.list-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px;border-radius:16px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line2)
}
.list-dot{
  width:10px;height:10px;border-radius:999px;margin-top:4px;flex-shrink:0
}
.feed-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px
}
.feed-card{
  padding:16px;border-radius:18px;border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02))
}
.feed-title{font-size:13px;font-weight:800;margin-bottom:8px}
.feed-copy{font-size:12px;line-height:1.8;color:var(--text2)}
.metric-bars{display:flex;flex-direction:column;gap:10px}
.metric-row{display:grid;grid-template-columns:100px 1fr 56px;gap:10px;align-items:center}
.metric-row .bar{height:7px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}
.metric-row .bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--acc),var(--violet))}

/* SANCTUM */
#sanctum-layout{
  background:
    radial-gradient(circle at 15% 10%,rgba(104,245,219,.10),transparent 26%),
    radial-gradient(circle at 80% 12%,rgba(94,197,255,.12),transparent 22%),
    linear-gradient(180deg,#031118 0%,#07151d 100%);
}
.sanctum-shell{
  display:grid;
  grid-template-columns:280px 1fr 300px;
  gap:16px;
  min-height:100%;
}
.sanctum-col{display:flex;flex-direction:column;gap:16px}
.sanctum-stage{
  position:relative;
  min-height:320px;overflow:hidden
}
.sanctum-stage::before{
  content:"";
  position:absolute;inset:0;
  background:
    linear-gradient(90deg,rgba(2,12,18,.94) 0%,rgba(2,12,18,.58) 38%,rgba(2,12,18,.26) 72%,rgba(2,12,18,.88) 100%),
    var(--layout-image) center/cover no-repeat;
}
.sanctum-stage::after{
  content:"";
  position:absolute;inset:auto 8% -80px auto;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(104,245,219,.18),transparent 70%);
  filter:blur(18px)
}
.sanctum-stage-inner{
  position:relative;z-index:1;padding:24px;min-height:320px;
  display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:end
}
.sanctum-stage-copy .hero-title{font-size:34px}
.sanctum-cards{
  display:grid;grid-template-columns:1fr 1fr;gap:12px
}
.sanctum-mini{
  padding:14px;border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(104,245,219,.14)
}
.sanctum-mini .t{font-size:10px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-weight:800}
.sanctum-mini .v{font-size:22px;font-weight:900;margin-top:8px}
.sanctum-quest{
  padding:18px;
  border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid rgba(104,245,219,.14)
}
.quest-steps{display:flex;flex-direction:column;gap:12px;margin-top:14px}
.quest-step{
  display:flex;gap:12px;align-items:flex-start;
  padding:12px;border-radius:16px;
  background:rgba(255,255,255,.03);border:1px solid var(--line2)
}
.quest-num{
  width:28px;height:28px;border-radius:999px;display:grid;place-items:center;
  font-size:11px;font-weight:900;
  background:rgba(104,245,219,.12);color:var(--acc);flex-shrink:0
}
.quest-copy{font-size:12px;line-height:1.7;color:var(--text2)}

/* PRIME */
#prime-layout{
  background:
    radial-gradient(circle at 50% 18%,rgba(193,255,86,.08),transparent 20%),
    radial-gradient(circle at 50% 62%,rgba(211,178,109,.10),transparent 34%),
    linear-gradient(180deg,#070b10 0%,#0c1115 100%);
}
.prime-shell{
  position:relative;
  min-height:100%;
  perspective:1400px;
  display:grid;
  place-items:center;
}
.prime-backdrop{
  position:absolute;inset:16px;
  border-radius:34px;
  overflow:hidden;
  border:1px solid rgba(211,178,109,.20);
  background:
    linear-gradient(180deg,rgba(8,10,12,.72),rgba(8,10,12,.82)),
    var(--layout-image) center/cover no-repeat;
  box-shadow:inset 0 0 0 1px rgba(214,255,103,.04), 0 32px 100px rgba(0,0,0,.55);
}
.prime-backdrop::after{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 50% 50%,rgba(214,255,103,.06),transparent 22%),
    linear-gradient(180deg,rgba(211,178,109,.08),transparent 32%,transparent 70%,rgba(214,255,103,.04));
  pointer-events:none
}
.prime-ui{
  position:relative;
  z-index:2;
  width:min(1440px,94vw);
  height:min(860px,86vh);
  display:grid;
  grid-template-columns:320px 1fr 320px;
  grid-template-rows:112px 1fr 190px;
  grid-template-areas:
    "top top top"
    "left core right"
    "bottom bottom bottom";
  gap:20px;
}
.prime-top{
  grid-area:top;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}
.prime-top .rail,
.prime-wing,
.prime-bottom{
  border:1px solid rgba(211,178,109,.24);
  background:linear-gradient(180deg,rgba(10,13,16,.70),rgba(10,13,16,.84));
  backdrop-filter:blur(14px);
  box-shadow:0 20px 50px rgba(0,0,0,.36), inset 0 0 0 1px rgba(214,255,103,.03);
}
.prime-top .rail{
  height:100%;
  border-radius:28px;
  padding:18px 20px;
  display:flex;align-items:center;justify-content:space-between
}
.prime-top .center-title{
  padding:0 28px;
  text-align:center;
}
.prime-top .center-title .label{
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#b69a5c;font-weight:900
}
.prime-top .center-title .title{
  font-size:30px;font-weight:900;letter-spacing:.14em;color:#efe3bb;margin-top:6px
}
.prime-top .center-title .sub{
  font-size:11px;color:rgba(239,227,187,.66);margin-top:6px
}
.prime-wing{
  border-radius:34px;
  padding:18px;
  overflow:hidden;
}
.prime-left{
  grid-area:left;
  transform:rotateY(12deg) rotateX(1.4deg);
  transform-origin:right center;
}
.prime-right{
  grid-area:right;
  transform:rotateY(-12deg) rotateX(1.4deg);
  transform-origin:left center;
}
.prime-core{
  grid-area:core;
  position:relative;
  display:grid;place-items:center;
}
.reactor-wrap{
  position:relative;
  width:min(540px,46vw);
  aspect-ratio:1/1;
  display:grid;place-items:center;
}
.reactor-ring-1,.reactor-ring-2,.reactor-ring-3{
  position:absolute;border-radius:50%;
  border:1px solid rgba(211,178,109,.28);
  box-shadow:inset 0 0 50px rgba(214,255,103,.05), 0 0 50px rgba(214,255,103,.05);
}
.reactor-ring-1{inset:0}
.reactor-ring-2{inset:34px;border-style:dashed;border-color:rgba(214,255,103,.28)}
.reactor-ring-3{inset:78px;border-color:rgba(239,227,187,.22)}
.reactor-core{
  position:absolute;inset:130px;border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%,rgba(214,255,103,.18),rgba(214,255,103,.06) 30%,rgba(8,12,14,.96) 66%);
  border:1px solid rgba(214,255,103,.24);
  box-shadow:0 0 80px rgba(214,255,103,.08), inset 0 0 50px rgba(214,255,103,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:30px
}
.reactor-kicker{
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;font-weight:900;color:#b69a5c
}
.reactor-value{
  font-size:64px;font-weight:900;letter-spacing:-.06em;color:#f4f0d8;line-height:1;margin-top:14px
}
.reactor-sub{
  font-size:13px;color:rgba(239,227,187,.74);margin-top:8px
}
.reactor-goal{
  margin-top:14px;font-size:12px;line-height:1.8;color:rgba(239,227,187,.82)
}
.reactor-points{
  position:absolute;inset:0;
}
.reactor-point{
  position:absolute;width:12px;height:12px;border-radius:50%;
  background:#d6ff67;box-shadow:0 0 18px rgba(214,255,103,.8)
}
.reactor-point.p1{top:9%;left:48%}
.reactor-point.p2{top:28%;right:8%}
.reactor-point.p3{bottom:15%;right:20%}
.reactor-point.p4{bottom:12%;left:22%}
.reactor-point.p5{top:30%;left:8%}
.prime-bottom{
  grid-area:bottom;
  border-radius:34px;
  padding:18px 20px;
  transform:rotateX(12deg);
  transform-origin:center top;
  display:grid;
  grid-template-columns:1.15fr .85fr .85fr;
  gap:16px;
}
.prime-block h4{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:#b69a5c;font-weight:900;margin-bottom:12px
}
.prime-list{display:flex;flex-direction:column;gap:10px}
.prime-item{
  padding:12px;border-radius:16px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(211,178,109,.16)
}
.prime-item .tt{font-size:12px;font-weight:800;color:#f2ecd2}
.prime-item .cp{font-size:11px;color:rgba(239,227,187,.68);line-height:1.65;margin-top:5px}
.prime-stat-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px
}
.prime-stat{
  padding:12px;border-radius:16px;
  border:1px solid rgba(211,178,109,.16);
  background:rgba(255,255,255,.03)
}
.prime-stat .l{font-size:10px;color:rgba(239,227,187,.56);text-transform:uppercase;letter-spacing:.12em;font-weight:900}
.prime-stat .v{font-size:24px;font-weight:900;margin-top:8px;color:#f7f4df}
.prime-wing h3{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#b69a5c;font-weight:900;margin-bottom:14px
}
.prime-wing .stack{display:flex;flex-direction:column;gap:12px}
.prime-tile{
  padding:14px;border-radius:18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(211,178,109,.16)
}
.prime-tile .tt{font-size:12px;font-weight:800;color:#f2ecd2}
.prime-tile .cp{font-size:11px;line-height:1.7;color:rgba(239,227,187,.66);margin-top:6px}
.prime-commands{
  display:flex;flex-wrap:wrap;gap:8px
}
.prime-cmd{
  padding:8px 10px;border-radius:999px;
  background:rgba(214,255,103,.08);
  border:1px solid rgba(214,255,103,.18);
  color:#d6ff67;
  font-size:10px;font-weight:900
}

/* Common drawers */
.fab-stack{
  position:fixed;right:20px;bottom:20px;
  display:flex;flex-direction:column;gap:10px;z-index:60
}
.fab{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  border-radius:18px;
  border:1px solid var(--line);
  background:var(--surface-2);
  color:var(--text);
  box-shadow:var(--shadow);
  backdrop-filter:var(--glass-blur);
}
.fab-badge{
  min-width:24px;height:24px;border-radius:999px;
  display:grid;place-items:center;
  padding:0 8px;
  background:var(--acc);
  color:#091019;
  font-weight:900;font-size:11px
}

.drawer{
  position:fixed;top:0;bottom:0;right:0;
  width:min(520px,92vw);
  background:rgba(7,10,16,.95);
  backdrop-filter:blur(18px);
  border-left:1px solid var(--line);
  box-shadow:-20px 0 60px rgba(0,0,0,.45);
  z-index:80;
  display:flex;flex-direction:column;
  transform:translateX(104%);
  transition:transform .25s ease;
}
.drawer.on{transform:translateX(0)}
.drawer-header{
  padding:18px 18px 14px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:12px
}
.drawer-title-wrap h3{
  font-size:15px;font-weight:900;letter-spacing:-.03em
}
.drawer-title-wrap p{
  font-size:11px;color:var(--text3);margin-top:4px
}
.drawer-body{flex:1;overflow:auto}
.drawer-close{
  width:36px;height:36px;border-radius:12px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--text2)
}

/* Console Drawer */
#console-agent-strip{
  padding:14px 18px;border-bottom:1px solid var(--line2);
  display:flex;gap:8px;overflow:auto
}
.console-agent{
  min-width:130px;padding:10px 12px;border-radius:16px;
  border:1px solid var(--line);background:rgba(255,255,255,.03)
}
.console-agent.active{border-color:color-mix(in srgb,var(--agent-color) 55%, var(--line));background:color-mix(in srgb,var(--agent-color) 10%, rgba(255,255,255,.03))}
.console-agent .n{font-size:11px;font-weight:800}
.console-agent .s{font-size:10px;color:var(--text3);margin-top:4px}
.console-toolbar{
  padding:12px 18px;border-bottom:1px solid var(--line2);
  display:flex;gap:8px;flex-wrap:wrap
}
.console-toolbar button{
  border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--text2);
  padding:8px 10px;font-size:10px;font-weight:800
}
.console-toolbar button:hover{border-color:var(--acc);color:var(--acc)}
#file-area{
  padding:12px 18px;border-bottom:1px solid var(--line2);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap
}
.file-chip{
  display:flex;align-items:center;gap:7px;
  padding:6px 10px;border-radius:999px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);
  font-size:10px;color:var(--text2)
}
.file-chip-rm{
  background:none;border:none;color:var(--text3);font-size:12px
}
#file-label{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 10px;border-radius:999px;
  border:1px solid var(--line);background:rgba(255,255,255,.04);
  font-size:10px;font-weight:800;color:var(--text2)
}
#file-label:hover{border-color:var(--acc);color:var(--acc)}
#file-input{display:none}
.file-hint{font-size:10px;color:var(--text3)}
#chat{
  padding:18px;display:flex;flex-direction:column;gap:12px
}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.u{flex-direction:row-reverse}
.mav{
  width:28px;height:28px;border-radius:12px;flex-shrink:0;
  display:grid;place-items:center;
  font-size:10px;font-weight:900;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--text3)
}
.msg.u .mav{
  background:var(--acc);color:#091019;border-color:transparent
}
.bub-wrap{max-width:84%}
.bub{
  position:relative;
  padding:12px 14px;border-radius:4px 16px 16px 16px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  color:var(--text2);
  font-size:12px;line-height:1.75;white-space:pre-wrap;word-break:break-word
}
.msg.u .bub{
  border-radius:16px 4px 16px 16px;
  background:rgba(223,255,79,.08);
  border-color:rgba(223,255,79,.16);
  color:var(--text)
}
.mt{font-size:9px;color:var(--text3);margin-top:8px;text-align:right}
.bub-actions{
  display:flex;gap:7px;flex-wrap:wrap;margin-top:8px
}
.bub-actions button{
  border-radius:999px;padding:6px 10px;
  border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text2);
  font-size:10px;font-weight:800
}
.bub-actions button:hover{border-color:var(--acc);color:var(--acc)}
#typ{display:none;gap:8px;align-items:center;padding:0 18px 12px}
#typ.on{display:flex}
.d{
  width:7px;height:7px;border-radius:999px;background:var(--acc);
  animation:typingDot 1.2s ease-in-out infinite;opacity:.45
}
.d:nth-child(2){animation-delay:.2s}
.d:nth-child(3){animation-delay:.4s}
@keyframes typingDot{
  0%,100%{transform:translateY(0);opacity:.45}
  50%{transform:translateY(-4px);opacity:1}
}
#inp{
  margin-top:auto;
  padding:16px 18px 18px;
  border-top:1px solid var(--line);
  background:rgba(7,10,16,.96)
}
#inp-row{display:flex;gap:10px;align-items:flex-end}
#msg-in{
  flex:1;min-height:66px;max-height:180px;resize:vertical;
  padding:14px 14px;border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  color:var(--text);outline:none;line-height:1.6
}
#msg-in:focus{border-color:var(--acc)}
#snd{
  border:none;border-radius:18px;padding:14px 18px;
  background:linear-gradient(135deg,var(--acc),color-mix(in srgb,var(--acc) 70%, white));
  color:#091019;font-weight:900
}
#inp-hint{font-size:10px;color:var(--text3);margin-top:8px}
.consult-card{
  background:linear-gradient(135deg,rgba(244,63,94,.10),rgba(245,158,11,.05));
  border:1px solid rgba(244,63,94,.22);border-radius:18px;
  padding:16px
}
.consult-card-title{font-size:11px;font-weight:900;color:#f59e0b;letter-spacing:.08em;text-transform:uppercase}
.consult-card-q{font-size:12px;line-height:1.75;color:var(--text);margin-top:8px}
.consult-card-input{
  width:100%;margin-top:12px;
  min-height:80px;resize:vertical;
  border-radius:14px;border:1px solid var(--line);
  background:rgba(0,0,0,.18);padding:12px;color:var(--text);outline:none
}
.consult-card-btn{
  margin-top:10px;padding:10px 14px;border:none;border-radius:14px;
  background:#f59e0b;color:#1b1204;font-weight:900
}

/* Tasks Drawer */
#tasks-body{
  padding:16px;display:flex;flex-direction:column;gap:14px
}
.task-sec-title{
  font-size:10px;color:var(--text3);letter-spacing:.18em;text-transform:uppercase;font-weight:900
}
.tp-task{
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  border-radius:18px;
  padding:12px;
}
.tp-task.done{opacity:.58}
.tp-task-row{display:flex;align-items:flex-start;gap:10px}
.tp-check{
  width:20px;height:20px;border-radius:7px;flex-shrink:0;
  border:1.5px solid var(--line);
  display:grid;place-items:center
}
.tp-task.done .tp-check{
  background:var(--acc);border-color:var(--acc);color:#091019;font-weight:900
}
.tp-task-content{flex:1;min-width:0}
.tp-task-txt{font-size:12px;line-height:1.7;color:var(--text2)}
.tp-task.done .tp-task-txt{text-decoration:line-through;color:var(--text3)}
.tp-task-ag,.tp-task-time,.tp-task-goal{font-size:10px;margin-top:5px}
.tp-task-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tp-task-action-btn{
  padding:6px 10px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);font-size:10px;color:var(--text2);font-weight:800
}
.tp-task-action-btn:hover{border-color:var(--acc);color:var(--acc)}
.tp-task-action-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.tp-add-btn{
  width:100%;padding:10px 12px;border-radius:16px;
  border:1px dashed rgba(223,255,79,.22);
  background:rgba(223,255,79,.06);color:var(--acc);font-size:11px;font-weight:900
}
.tp-log-item{
  display:flex;gap:10px;align-items:flex-start;
  padding:12px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.03)
}
.tp-log-title{font-size:12px;font-weight:800}
.tp-log-meta{font-size:10px;color:var(--text3);margin-top:5px}

/* Modals */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  display:none;align-items:center;justify-content:center;
  padding:20px;z-index:100
}
.modal.on{display:flex}
.modal-box{
  width:min(700px,95vw);max-height:88vh;
  background:var(--surface-2);border:1px solid var(--line);
  border-radius:28px;box-shadow:var(--shadow);
  overflow:hidden;display:flex;flex-direction:column
}
.modal-header{
  padding:18px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:12px
}
.modal-title{
  font-size:15px;font-weight:900
}
.modal-sub{font-size:11px;color:var(--text3);margin-top:4px}
.modal-close{
  width:38px;height:38px;border-radius:14px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--text2)
}
.modal-body{
  padding:18px 20px;overflow:auto;display:flex;flex-direction:column;gap:16px
}
.form-sec{
  display:flex;flex-direction:column;gap:8px
}
.form-sec label{
  font-size:11px;font-weight:800;color:var(--text2)
}
.form-sec input,.form-sec textarea{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px 14px;
  color:var(--text);
  outline:none
}
.form-sec input:focus,.form-sec textarea:focus{border-color:var(--acc)}
.form-hint{font-size:10px;color:var(--text3)}
.settings-wide-btn{
  width:100%;padding:12px 14px;border-radius:16px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--text2);font-weight:900
}
.settings-wide-btn:hover{border-color:var(--acc);color:var(--acc)}
.settings-danger:hover{border-color:var(--danger)!important;color:var(--danger)!important}
#kpi-editor{
  display:none;padding:14px;border-radius:18px;border:1px solid var(--line);
  background:rgba(255,255,255,.03)
}
#kpi-editor-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.kpi-edit-row{
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--line);background:rgba(255,255,255,.03);
  border-radius:14px;padding:10px
}
.kpi-edit-lbl{font-size:11px;color:var(--text2);flex:1;min-width:0}
.kpi-edit-in{
  width:70px;text-align:right;
  background:rgba(0,0,0,.18);border:1px solid var(--line);
  border-radius:10px;padding:7px 8px;color:var(--text)
}
.kpi-edit-unit{font-size:10px;color:var(--text3)}

.pipe-steps{display:flex;flex-direction:column;gap:10px}
.pipe-step{
  border:1px solid var(--line);border-radius:18px;padding:14px;
  background:rgba(255,255,255,.03)
}
.pipe-step.active{border-color:rgba(223,255,79,.22);background:rgba(223,255,79,.05)}
.pipe-step.done{border-color:rgba(61,220,145,.22);background:rgba(61,220,145,.05)}
.pipe-step-hd{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pipe-step-num{
  width:26px;height:26px;border-radius:999px;
  display:grid;place-items:center;font-size:11px;font-weight:900;
  background:rgba(255,255,255,.05);border:1px solid var(--line)
}
.pipe-step.active .pipe-step-num{background:var(--acc);border-color:var(--acc);color:#091019}
.pipe-step.done .pipe-step-num{background:var(--green);border-color:var(--green);color:#091019}
.pipe-status-badge{
  padding:4px 8px;border-radius:999px;font-size:10px;font-weight:900
}
.pipe-status-wait{background:rgba(255,255,255,.05);color:var(--text3)}
.pipe-status-run{background:rgba(86,216,255,.10);color:var(--cyan)}
.pipe-status-done{background:rgba(61,220,145,.12);color:var(--green)}
.pipe-status-err{background:rgba(244,63,94,.12);color:var(--danger)}
.pipe-step-body{
  white-space:pre-wrap;word-break:break-word;
  font-size:12px;line-height:1.75;color:var(--text2);margin-top:10px
}
.pipe-step-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.pipe-btn{
  padding:8px 12px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--text2);font-size:10px;font-weight:900
}
.pipe-btn:hover{border-color:var(--acc);color:var(--acc)}
#pipe-progress-wrap{padding:0 20px 18px}
#pipe-progress-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}
#pipe-progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--acc))}
#pipe-progress-text{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:8px}
.pipe-start-btn{
  margin:0 20px 20px;
  padding:13px 16px;border:none;border-radius:18px;
  background:linear-gradient(135deg,var(--acc),color-mix(in srgb,var(--acc) 70%, white));
  color:#091019;font-weight:900
}

.td-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.td-spinner,.nfp-spinner{
  width:15px;height:15px;border-radius:50%;
  border:2px solid rgba(223,255,79,.18);border-top-color:var(--acc);
  animation:spin .8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
#td-body .td-content{
  white-space:pre-wrap;word-break:break-word;
  font-size:12px;line-height:1.85;color:var(--text2)
}
.td-copy-btn,.nfp-copy-btn{
  padding:12px 14px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--acc),color-mix(in srgb,var(--acc) 70%, white));
  color:#091019;font-weight:900
}
.td-copy-btn:hover,.nfp-copy-btn:hover{filter:brightness(1.03)}
.improve-actions{display:flex;gap:10px;justify-content:flex-end}
.improve-cancel,.improve-save,.nfp-sub-btn{
  padding:10px 14px;border-radius:14px;font-weight:900
}
.improve-cancel,.nfp-sub-btn{
  border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text2)
}
.improve-save{border:none;background:var(--danger);color:white}

.nfp-tabs{
  display:flex;border-bottom:1px solid var(--line)
}
.nfp-tab{
  flex:1;padding:12px 14px;background:none;border:none;
  color:var(--text3);font-weight:900
}
.nfp-tab.on{color:var(--acc);border-bottom:2px solid var(--acc)}
.nfp-meta{
  display:flex;gap:12px;flex-wrap:wrap;
  padding:12px 20px;border-bottom:1px solid var(--line2);background:rgba(255,255,255,.02)
}
.nfp-meta-item{font-size:10px;color:var(--text3)}
.nfp-meta-item strong{color:var(--text2);font-family:'JetBrains Mono',monospace}
.nfp-body{padding:18px 20px;overflow:auto;flex:1}
.nfp-preview,.nfp-raw{
  font-size:12px;line-height:1.9;color:var(--text2);white-space:pre-wrap;word-break:break-word
}
.nfp-raw{font-family:'JetBrains Mono',monospace}
.nfp-ftr{
  display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--line)
}
.nfp-copy-btn{flex:1}
.nfp-copy-btn.copied{background:var(--green)}
#consult-badge{
  display:none;align-items:center;gap:8px;
  padding:8px 12px;border-radius:999px;
  background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.22);

/* Responsive */
@media (max-width:1400px){
  #glyph-layout .layout-grid{
